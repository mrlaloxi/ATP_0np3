<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Colector de Evidencias ATP — Reporte de Protocolo de Pruebas</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <script src="https://cdn.jsdelivr.net/npm/docx@7.8.2/build/index.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            ink: '#0F172A',
            signal: '#2563EB',
            signalDark: '#1D4ED8',
          },
          fontFamily: {
            mono: ['ui-monospace', 'SFMono-Regular', 'Menlo', 'Consolas', 'monospace'],
          }
        }
      }
    }
  </script>

  <style>
    :root { color-scheme: light; }
    body { -webkit-font-smoothing: antialiased; }

    /* Dropzone: estados visuales para pegar (Ctrl+V) */
    .dropzone {
      border: 2px dashed #CBD5E1;
      transition: border-color .15s ease, background-color .15s ease, box-shadow .15s ease;
      cursor: pointer;
      outline: none;
    }
    .dropzone:hover { border-color: #93C5FD; background-color: #F8FAFC; }
    .dropzone.is-active {
      border-color: #2563EB;
      background-color: #EFF6FF;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, .18);
    }
    .dropzone.is-dragover {
      border-color: #059669;
      background-color: #ECFDF5;
      box-shadow: 0 0 0 3px rgba(5, 150, 105, .18);
    }
    .dropzone.has-image { border-style: solid; border-color: #E2E8F0; cursor: default; }

    /* Barra de completitud */
    .meter-track { background: #E2E8F0; border-radius: 999px; overflow: hidden; }
    .meter-fill { height: 100%; transition: width .3s ease, background-color .3s ease; }

    @media print { .no-print { display: none !important; } }
  </style>
</head>

<body class="bg-slate-50 text-ink min-h-screen">

  <div id="login-container" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/80 backdrop-blur-sm p-4 hidden">
    <div class="bg-white rounded-2xl border border-slate-200 shadow-2xl p-6 w-full max-w-md space-y-4">
      <div class="text-center">
        <div class="inline-flex h-12 w-12 rounded-xl bg-signalDark items-center justify-center text-white font-bold text-xl mb-2">ATP</div>
        <h2 class="text-xl font-bold text-slate-800">Acceso Colector ATP</h2>
        <p class="text-xs text-slate-500">Ingresa para ver y consolidar el reporte en tiempo real mediante Supabase</p>
      </div>
      <div class="space-y-3">
        <label class="block">
          <span class="text-xs font-medium text-slate-500">Correo Electrónico</span>
          <input id="login-email" type="email" placeholder="nombre@correo.com" class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-signal" />
        </label>
        <label class="block">
          <span class="text-xs font-medium text-slate-500">Contraseña</span>
          <input id="login-pass" type="password" placeholder="••••••••" class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-signal" />
        </label>
      </div>
      <div class="flex gap-2 pt-2">
        <button id="btn-login" class="w-full py-2.5 text-sm font-semibold rounded-lg bg-signal hover:bg-signalDark text-white shadow-sm transition">Ingresar</button>
      </div>
